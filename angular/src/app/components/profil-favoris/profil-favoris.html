<div class="favorisDiv">
<h1>Mes recettes favorites</h1>
    <div class="divRecette">
        <!--boucle graphique-->
        @for(recetteFavori of recettesFavoris; track recetteFavori.id; let i=$index){
        <div>
            <h2>{{recetteFavori.nomRecette}}</h2>
            <img [src]="recetteFavori.img" alt="cake">
            <button type="button" class="btn_delete"><mat-icon>delete</mat-icon></button>
        </div> 
        }
        @empty {
            <p>Aucune recettes dans les favoris</p>
        }
    </div>
</div>
